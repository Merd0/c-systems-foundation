name: C Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build examples and run project tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Compile examples
        run: make all

      - name: Run modular project tests
        run: make test
