name: C Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-all-examples:
    name: Build all standalone C examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Compile examples
        run: make all

